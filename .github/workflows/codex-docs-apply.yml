name: Codex Docs Apply

on:
  issue_comment:
    types: [created]

concurrency:
  group: codex-docs-apply-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  codex-docs-apply:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '/codex-docs-apply')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Resolve PR context
        id: context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const association = context.payload.comment.author_association ?? 'NONE';

            if (!allowedAssociations.has(association)) {
              core.setOutput('ready', 'false');
              core.setOutput(
                'status_message',
                `Only repository owners, members, or collaborators can run \`/codex-docs-apply\` (received \`${association}\`).`,
              );
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            if (pull.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setOutput('ready', 'false');
              core.setOutput(
                'status_message',
                'This workflow only supports pull requests whose head branch lives in this repository.',
              );
              return;
            }

            const marker = '<!-- codex-docs-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const reviewComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (!reviewComment) {
              core.setOutput('ready', 'false');
              core.setOutput(
                'status_message',
                'No existing Codex docs review comment was found on this pull request.',
              );
              return;
            }

            core.setOutput('ready', 'true');
            core.setOutput('status_message', '');
            core.setOutput('pr_number', String(pull.number));
            core.setOutput('base_ref', pull.base.ref);
            core.setOutput('head_ref', pull.head.ref);
            core.setOutput('head_sha', pull.head.sha);

      - name: Check out PR head branch
        if: steps.context.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.context.outputs.head_ref }}
          fetch-depth: 0

      - name: Fetch base ref
        if: steps.context.outputs.ready == 'true'
        run: git fetch --no-tags origin +refs/heads/${{ steps.context.outputs.base_ref }}:refs/remotes/origin/${{ steps.context.outputs.base_ref }}

      - name: Build Codex apply context
        if: steps.context.outputs.ready == 'true'
        uses: actions/github-script@v7
        env:
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
            });

            const marker = '<!-- codex-docs-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const reviewComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (!reviewComment) {
              core.setFailed('No Codex docs review comment was found while building the apply context.');
              return;
            }

            const contextBody = [
              '# Codex Docs Apply Context',
              '',
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Pull request: #${pull.number}`,
              `Title: ${pull.title}`,
              `Base ref: ${process.env.BASE_REF}`,
              `Head ref: ${process.env.HEAD_REF}`,
              `Head SHA: ${process.env.HEAD_SHA}`,
              `Trigger comment author: @${context.payload.comment.user.login}`,
              `Trigger comment association: ${context.payload.comment.author_association}`,
              '',
              '## Pull Request Body',
              pull.body?.trim() || '_No PR description provided._',
              '',
              '## Triggering Comment',
              context.payload.comment.body.trim(),
              '',
              '## Existing Codex Docs Review Comment',
              reviewComment.body.trim(),
            ].join('\n');

            const contextDir = path.join(process.env.GITHUB_WORKSPACE, '.codex-docs-apply');
            fs.mkdirSync(contextDir, { recursive: true });
            fs.writeFileSync(path.join(contextDir, 'context.md'), `${contextBody}\n`);

      - name: Run Codex docs apply
        if: steps.context.outputs.ready == 'true'
        id: run_codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/docs-apply.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Remove Codex apply context
        if: steps.context.outputs.ready == 'true'
        run: rm -rf .codex-docs-apply

      - name: Validate docs-only changes
        if: steps.context.outputs.ready == 'true' && steps.run_codex.outcome == 'success'
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          changed_files="$(git status --porcelain | awk '{print $2}')"

          if [[ -n "$changed_files" ]]; then
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              case "$file" in
                AGENTS.md|agent_docs/*)
                  ;;
                *)
                  echo "Restoring non-docs file: $file"
                  git restore -- "$file"
                  ;;
              esac
            done <<< "$changed_files"
          fi

          docs_changed="$(git status --porcelain | awk '{print $2}')"

          if [[ -z "$docs_changed" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit docs updates
        if: >
          steps.context.outputs.ready == 'true' &&
          steps.run_codex.outcome == 'success' &&
          steps.validate.outcome == 'success' &&
          steps.validate.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md agent_docs
          git commit -m "Apply Codex docs updates"
          git push origin HEAD:${{ steps.context.outputs.head_ref }}
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build result message
        if: always()
        id: result
        shell: bash
        env:
          READY: ${{ steps.context.outputs.ready }}
          STATUS_MESSAGE: ${{ steps.context.outputs.status_message }}
          RUN_CODEX_OUTCOME: ${{ steps.run_codex.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          CHANGED: ${{ steps.validate.outputs.changed }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          details="$FINAL_MESSAGE"

          if [[ "$details" == '## Codex Docs Apply'* ]]; then
            details="${details#'## Codex Docs Apply'}"
            details="${details#"$'\n'"}"
          fi

          if [[ "$READY" != "true" ]]; then
            summary="$STATUS_MESSAGE"
          elif [[ "$RUN_CODEX_OUTCOME" != "success" ]]; then
            summary='Codex did not complete the docs-apply run. Check the workflow logs for details.'
          elif [[ "$CHANGED" == "true" && -n "$COMMIT_SHA" ]]; then
            short_sha="${COMMIT_SHA:0:7}"
            summary="Applied docs updates to \`$HEAD_REF\` in \`$short_sha\`."
            summary+=$'\n\n'
            summary+='This push uses `GITHUB_TOKEN`, so it will not trigger other GitHub Actions workflows automatically.'
          else
            summary='No documentation changes were applied.'
          fi

          {
            echo 'body<<EOF'
            echo '## Codex Docs Apply'
            echo
            echo "$summary"
            if [[ -n "$details" ]]; then
              echo
              echo "$details"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert Codex docs apply comment
        if: always()
        uses: actions/github-script@v7
        env:
          RESULT_BODY: ${{ steps.result.outputs.body }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number || github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-docs-apply -->';
            const body = `${marker}

            ${process.env.RESULT_BODY}`.trim();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
