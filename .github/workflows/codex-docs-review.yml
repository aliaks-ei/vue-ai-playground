name: Codex Docs Review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

concurrency:
  group: codex-docs-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-docs-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Check out PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Run Codex docs review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/docs-review.md
          output-file: codex-docs-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

  post-feedback:
    needs: codex-docs-review
    if: needs.codex-docs-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert Codex docs review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-docs-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-docs-review -->';
            const noUpdatesNeeded = 'No AGENTS.md or agent_docs updates needed for this PR.';
            const applyHint = process.env.CODEX_FINAL_MESSAGE.includes(noUpdatesNeeded)
              ? ''
              : '\n\nComment `/codex-docs-apply` on this PR to have Codex apply the suggested docs updates.';
            const body = `${marker}

            ${process.env.CODEX_FINAL_MESSAGE}${applyHint}`.trim();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
